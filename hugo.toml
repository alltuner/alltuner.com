baseURL = "https://alltuner.com"
title = "All Tuner Labs"
theme = "alltuner-theme"
disableHugoGeneratorInject = true
enableRobotsTXT = true
ignoreFiles = ["CLAUDE\\.md", "AGENTS\\.md"]

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    weight = 1
    languageCode = "en"
    languageName = "English"
  [languages.ca]
    weight = 2
    languageCode = "ca"
    languageName = "Catala"
    contentDir = "content/ca"
  [languages.sv]
    weight = 3
    languageCode = "sv"
    languageName = "Svenska"
    contentDir = "content/sv"
  [languages.es]
    weight = 4
    languageCode = "es"
    languageName = "Espanol"
    contentDir = "content/es"

[markup.goldmark.renderer]
unsafe = true

