# Projects
[[params.projects]]
name = "VibeTuner"
description = "Production-ready FastAPI scaffolding with flexible databases, HTMX frontend, and Docker deployment."
description_ca = "Bastides FastAPI llestes per a producció amb bases de dades flexibles, frontend HTMX i desplegament Docker."
description_es = "Andamiaje FastAPI listo para producción con bases de datos flexibles, frontend HTMX y despliegue Docker."
link = "https://github.com/alltuner/vibetuner"
status = "active"

[[params.projects]]
name = "Uns minuts i a clapar"
description = "AI-produced Catalan bedtime podcast with short educational stories for children and families."
description_ca = "Podcast de contes de bona nit en català creat amb IA, amb històries educatives per a infants i famílies."
description_es = "Podcast de cuentos para dormir en catalán creado con IA, con historias educativas para niños y familias."
link = "https://a-clapar.cat"
status = "active"

[[params.projects]]
name = "Shiftuner"
description = "Privacy-first time tracking for Spanish labor law compliance."
description_ca = "Control horari respectuós amb la privadesa per complir la normativa laboral espanyola."
description_es = "Control horario respetuoso con la privacidad para cumplir la normativa laboral española."
link = "https://shiftuner.com"
status = "beta"

[[params.projects]]
name = "Radar de la Música"
description = "Curated directory of music innovation projects in Barcelona, with Barcelona Music Lab."
description_ca = "Directori de projectes d'innovació musical a Barcelona, amb Barcelona Music Lab."
description_es = "Directorio de proyectos de innovación musical en Barcelona, con Barcelona Music Lab."
status = "developing"

[[params.projects]]
name = "Castuner"
description = "AI-powered podcast platform for transcription, summarization, and video clip creation."
description_ca = "Plataforma de podcasts amb IA per a transcripció, resum i creació de clips de vídeo."
description_es = "Plataforma de podcasts con IA para transcripción, resumen y creación de clips de vídeo."
link = "https://castuner.com"
status = "investigation"

[[params.projects]]
name = "DevTuner"
description = "Engineering team health platform with practical insights, by engineers, for engineers."
description_ca = "Plataforma de salut d'equips d'enginyeria amb consells pràctics, d'enginyers per a enginyers."
description_es = "Plataforma de salud de equipos de ingeniería con consejos prácticos, de ingenieros para ingenieros."
link = "https://devtuner.com"
status = "idea"
