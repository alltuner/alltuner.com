{{ with .Site.Data.logos }}
<div class="logo-carousel mx-auto" role="marquee" aria-label="Client logos">
  <div class="logo-carousel-track">
    {{/* Primary list — accessible */}}
    <ul class="logo-carousel-list" role="list">
      {{ range . }}
      <li>
        <a href="{{ .url }}" class="text-raisin dark:text-raisin-dark">
          {{ if .logoDark }}
          <img src="/statics/img/logos/{{ .logo }}" alt="{{ .name }} logo" class="h-16 w-auto opacity-60 dark:hidden" width="120" height="40" loading="lazy">
          <img src="/statics/img/logos/{{ .logoDark }}" alt="{{ .name }} logo" class="h-16 w-auto hidden dark:block dark:opacity-50" width="120" height="40" loading="lazy">
          {{ else }}
          <img src="/statics/img/logos/{{ .logo }}" alt="{{ .name }} logo" class="h-16 w-auto opacity-60 dark:opacity-50" width="120" height="40" loading="lazy">
          {{ end }}
        </a>
      </li>
      {{ end }}
    </ul>
    {{/* Duplicate list — hidden from assistive tech */}}
    <ul class="logo-carousel-list" aria-hidden="true" role="presentation">
      {{ range . }}
      <li>
        <a href="{{ .url }}" class="text-raisin dark:text-raisin-dark" tabindex="-1">
          {{ if .logoDark }}
          <img src="/statics/img/logos/{{ .logo }}" alt="{{ .name }} logo" class="h-16 w-auto opacity-60 dark:hidden" width="120" height="40" loading="lazy">
          <img src="/statics/img/logos/{{ .logoDark }}" alt="{{ .name }} logo" class="h-16 w-auto hidden dark:block dark:opacity-50" width="120" height="40" loading="lazy">
          {{ else }}
          <img src="/statics/img/logos/{{ .logo }}" alt="{{ .name }} logo" class="h-16 w-auto opacity-60 dark:opacity-50" width="120" height="40" loading="lazy">
          {{ end }}
        </a>
      </li>
      {{ end }}
    </ul>
  </div>
</div>
{{ end }}
